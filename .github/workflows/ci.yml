name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Secret scan — fails the build on ANY finding ──────────────────────────
  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # v2 requires GITHUB_TOKEN to scan PRs/commits. No org license needed
          # for a personal/public repo. Any finding exits non-zero and fails the job.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # ── Light lint — py_compile (fatal) + markdown sanity (warn-only) ─────────
  lint:
    name: lint (python + markdown)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Compile all Python files
        run: |
          set -e
          files=$(find . -name '*.py' -not -path '*/node_modules/*' -not -path '*/.venv/*' -not -path '*/venv/*')
          if [ -z "$files" ]; then
            echo "No Python files found — skipping."
            exit 0
          fi
          echo "$files" | xargs -n1 python -m py_compile
          echo "All Python files compiled cleanly."

      - name: Markdown sanity (informational only)
        run: |
          # Never fails the build — surfaces warnings only.
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -s "$f" ] || echo "::warning file=$f::markdown file is empty"
            n=$(grep -c '^```' "$f" 2>/dev/null || true)
            n=${n:-0}
            if [ "$((n % 2))" -ne 0 ]; then
              echo "::warning file=$f::odd number of code fences (possible unbalanced block)"
            fi
          done < <(find . -name '*.md' -not -path '*/node_modules/*')
          echo "Markdown check complete (informational)."
